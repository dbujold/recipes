steps:
  - instruction: "Preheat oven to 350°F."
  - instruction: "Grease a square baking dish."
  - instruction: "In a large bowl, combine bread cubes, ham, cheese, onion and green onions."
  - instruction: "In another bowl, whisk eggs, milk, soy sauce, brown sugar, salt, and pepper."
  - instruction: "Pour the egg mixture over the bread mixture and stir to combine."
  - instruction: "Let the mixture sit for 10 minutes to absorb."
    duration: "10m"
  - instruction: "Transfer mixture to the baking dish and press down lightly."
  - instruction: "Bake for 45 minutes until golden and set."
    duration: "45m"
  - instruction: "Garnish with chopped parsley and serve warm."
